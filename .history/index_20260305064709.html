<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قيد الإنشاء | About Me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6a11cb;
            --secondary-color: #2575fc;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-color: #000000;
            --glass-bg: rgba(28, 28, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #F5F5F7;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            overflow: hidden;
            color: var(--text-color);
            color: var(--text-primary);
            position: relative;
        }

        /* خلفية متحركة */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        /* Stars Animation */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: var(--opacity);
            z-index: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--opacity); transform: scale(1); }
            50% { opacity: 0.2; transform: scale(0.5); }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 3rem;
            z-index: 10;
            padding: 4rem 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 480px;
            width: 90%;
            animation: float 6s ease-in-out infinite, fadeIn 1.5s ease-out;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #e0e0e0);
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(180deg, #fff, #b0b0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 2rem;
            opacity: 0.9;
            font-weight: 400;
            margin-bottom: 2.5rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 2rem auto;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.1rem;
            padding: 14px 35px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: var(--accent-color);
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.3);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            background: #0077ED;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 113, 227, 0.4);
        }

        .btn::before {
            content: '';
        /* Astronaut & Elements */
        .astro-container {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
            right: 5%;
            bottom: 10%;
            z-index: 5;
            animation: floatAstro 8s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn:hover::before {
            left: 100%;
        .astro-img {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        /* عناصر جمالية في الخلفية */
        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            backdrop-filter: blur(5px);
            z-index: 0;
        .speech-bubble {
            background: white;
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            margin-bottom: 15px;
            font-weight: 700;
            font-size: 0.9rem;
            position: relative;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1s backwards;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .c1 { width: 100px; height: 100px; top: 10%; left: 10%; animation: float 8s infinite reverse; }
        .c2 { width: 150px; height: 150px; bottom: 10%; right: 10%; animation: float 10s infinite; }

        @keyframes floatAstro {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media (max-width: 768px) {
            .astro-container {
                position: relative;
                right: auto;
                bottom: auto;
                margin-top: 3rem;
            }
            body {
                flex-direction: column;
                overflow-y: auto;
                padding: 2rem 0;
            }
        }

    </style>
</head>
<body>

    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div id="stars-container"></div>

    <div class="container">
        <div class="loader"></div>
        <h1>قيد الإنشاء</h1>
        <p>أعمل حالياً على بناء موقع تعريفي (About Me) مميز.<br>يمكنك زيارة ملفي الشخصي الآن:</p>
        <a href="https://guns.lol/faa0" class="btn">زيارة البروفايل</a>
        <p>أعمل حالياً على بناء موقعي الشخصي بتصميم فضائي مميز.<br>يرجى الانتظار، القادم أجمل.</p>
        <a href="https://guns.lol/faa0" class="btn">زيارة البروفايل الحالي</a>
    </div>

    <div class="astro-container">
        <div class="speech-bubble">انتظرونا قريباً! 🚀</div>
        <!-- صورة رائد فضاء ثلاثية الأبعاد عالية الجودة -->
        <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People%20with%20professions/Astronaut%20Light%20Skin%20Tone.png" alt="Astronaut" class="astro-img">
    </div>

    <script>
        const starsContainer = document.getElementById('stars-container');
        const starCount = 150;
        
        for(let i=0; i<starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const size = Math.random() * 2 + 1;
            const duration = Math.random() * 3 + 2;
            const opacity = Math.random();
            
            star.style.left = `${x}%`;
            star.style.top = `${y}%`;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${duration}s`);
            star.style.setProperty('--opacity', opacity);
            
            starsContainer.appendChild(star);
        }
    </script>

</body>
</html>
