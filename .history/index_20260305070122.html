<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قيد الإنشاء | About Me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --glass-bg: rgba(28, 28, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #F5F5F7;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            overflow: hidden;
            color: var(--text-primary);
            position: relative;
        }

        /* Stars Animation */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: var(--opacity);
            z-index: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--opacity); transform: scale(1); }
            50% { opacity: 0.2; transform: scale(0.5); }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 4rem 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 480px;
            width: 90%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(180deg, #fff, #b0b0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 2.5rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            padding: 14px 35px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            color: #fff;
            background: var(--accent-color);
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.3);
        }

        .btn:hover {
            background: #0077ED;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 113, 227, 0.4);
        }

        /* Astronaut & Elements */
        .astro-container {
            position: absolute;
            right: 5%;
            bottom: 10%;
            z-index: 5;
            animation: floatAstro 8s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .astro-img {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .speech-bubble {
            background: white;
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            margin-bottom: 15px;
            font-weight: 700;
            font-size: 0.9rem;
            position: relative;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1s backwards;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        @keyframes floatAstro {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media (max-width: 768px) {
            .astro-container {
                position: relative;
                right: auto;
                bottom: auto;
                margin-top: 3rem;
            }
            body {
                flex-direction: column;
                overflow-y: auto;
                padding: 2rem 0;
            }
        }

    </style>
</head>
<body>

    <div id="stars-container"></div>

    <div class="container">
        <div class="loader"></div>
        <h1>            هنا بيكون موقعي…</h1>
        <p>
            <br>
            بس للحين هو في طور “اصبر شوي” 😌
            <br>

            لا تشيل هم،
            <br>
            قريب تشوف شي يستاهل الانتظار ✨
            <br>
            خلك قريب…
            <br>
            الإقلاع أقرب مما تتوقع
            <br>
        </p>
        <a href="https://guns.lol/faa0" class="btn">زيارة البروفايل guns.lol</a>
    </div>

    <div class="astro-container">
        <div class="speech-bubble">
            لم يحن أوان الظهور بعد
            <br>
            فالفضاء يتهيأ لحدث غير اعتيادي
            <br>
            ترقب… فإن للنجوم موعدا
            <br>
        </div>
        <!-- صورة رائد فضاء ثلاثية الأبعاد عالية الجودة -->
        <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People%20with%20professions/Astronaut%20Light%20Skin%20Tone.png" alt="Astronaut" class="astro-img">
    </div>

    <script>
        const starsContainer = document.getElementById('stars-container');
        const starCount = 150;
        
        for(let i=0; i<starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const size = Math.random() * 2 + 1;
            const duration = Math.random() * 3 + 2;
            const opacity = Math.random();
            
            star.style.left = `${x}%`;
            star.style.top = `${y}%`;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${duration}s`);
            star.style.setProperty('--opacity', opacity);
            
            starsContainer.appendChild(star);
        }
    </script>

</body>
</html>
